name: Keep Render Awake

on:
  schedule:
    # Every 10 minutes, UTC. Keeps the free-tier Render instance from
    # spinning down (which caused the chatbot to stop responding).
    - cron: "*/10 * * * *"
  workflow_dispatch: {}

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Ping backend root
        run: curl -fsS --max-time 25 https://zyraluxe-ai-chatbot.onrender.com/ || true
      - name: Ping chat endpoint
        run: |
          curl -fsS --max-time 25 -X POST https://zyraluxe-ai-chatbot.onrender.com/chat \
            -H "Content-Type: application/json" \
            -d '{"message":"ping","context":{}}' || true
