<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Zyraluxe AI Concierge</title>
    <link rel="stylesheet" href="widget.css">
</head>
<body>

<div class="chat-container" id="chatContainer" aria-hidden="true">
    <div class="header">
        <div class="header-avatar" aria-hidden="true">
            <svg viewBox="0 0 48 48" width="26" height="26" fill="none" xmlns="http://www.w3.org/2000/svg">
                <rect x="9" y="14" width="30" height="22" rx="8" fill="#ffffff" fill-opacity="0.16" stroke="#ffffff" stroke-width="2"/>
                <circle cx="18" cy="25" r="3.2" fill="#ffffff"/>
                <circle cx="30" cy="25" r="3.2" fill="#ffffff"/>
                <path d="M19 32c2 2 8 2 10 0" stroke="#ffffff" stroke-width="2" stroke-linecap="round"/>
                <path d="M24 14v-4" stroke="#ffffff" stroke-width="2" stroke-linecap="round"/>
                <circle cx="24" cy="8" r="2.6" fill="#ffffff"/>
            </svg>
        </div>
        <div class="header-text">
            <span class="header-title">Zyraluxe AI Concierge</span>
            <span class="header-status">
                <span class="status-dot" aria-hidden="true"></span>
                Online
            </span>
        </div>
        <button class="chat-close" id="chatClose" type="button" aria-label="Minimize chat">&times;</button>
    </div>

    <div id="messages" class="messages">
        <div class="ai-message">
            Welcome to Zyraluxe Luxe Store<br><br>
            How can I help you today?
        </div>
    </div>

    <div class="input-area">
        <input
            id="message"
            placeholder="Ask me anything..."
        >

        <button id="send">
            Send
        </button>
    </div>
</div>

<button class="chat-launcher" id="chatLauncher" type="button" aria-label="Open Zyraluxe chat">
    <span class="launcher-bubble"></span>
</button>

<script src="widget.js"></script>

</body>
</html>
